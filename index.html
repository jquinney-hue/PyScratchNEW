<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PyScratch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/editor.css" />
  <link rel="stylesheet" href="css/panels.css" />
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header id="topbar">
      <div class="logo">
        <span class="logo-icon">🐍</span>
        <span class="logo-text">PyScratch</span>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" id="btn-save" title="Save project (.ps2)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save
        </button>
        <button class="btn btn-ghost" id="btn-load" title="Load project (.ps2)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Load
        </button>
        <button class="btn btn-ghost" id="btn-publish" title="Export standalone HTML">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Publish
        </button>
        <button class="btn btn-ghost" id="btn-help" title="Help / API reference">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Help
        </button>
      </div>
      <div class="topbar-controls">
        <button class="btn btn-green" id="btn-start" title="Start (Green Flag)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="btn btn-red" id="btn-stop" title="Stop">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        </button>
      </div>
    </header>

    <!-- Main Layout -->
    <div id="main-layout">
      <!-- Left Panel -->
      <div id="left-panel">
        <div class="panel-tabs">
          <button class="tab-btn active" data-tab="code">Code</button>
          <button class="tab-btn" data-tab="costumes">Costumes</button>
        </div>

        <!-- Code Tab -->
        <div id="tab-code" class="tab-content active">
          <div id="thread-panel">
            <div class="thread-panel-header">
              <span>Threads</span>
              <button class="btn-icon" id="btn-add-thread" title="Add thread">+</button>
            </div>
            <div id="thread-list"></div>
          </div>
          <div id="editor-panel">
            <div id="editor-toolbar">
              <span id="current-thread-label">Select a sprite</span>
            </div>
            <div id="code-editor-wrapper">
              <div id="line-numbers"></div>
              <textarea id="code-editor" spellcheck="false" placeholder="# Write Python here&#10;def game_start():&#10;    while True:&#10;        move_steps(3)&#10;        if on_edge():&#10;            bounce()&#10;        wait(0.016)"></textarea>
            </div>
            <div id="error-overlay" class="hidden"></div>
          </div>
        </div>

        <!-- Costumes Tab -->
        <div id="tab-costumes" class="tab-content">
          <div id="costume-panel">
            <div class="costume-section-header">
              <span id="costume-panel-title">Costumes</span>
            </div>
            <div id="costume-list"></div>
          </div>
        </div>
      </div>

      <!-- Right Panel -->
      <div id="right-panel">
        <!-- Stage Area -->
        <div id="stage-area">
          <div id="stage-container">
            <canvas id="stage-canvas"></canvas>
            <div id="stage-overlay">
              <div id="variable-display"></div>
              <div id="ask-overlay" class="hidden">
                <div id="ask-bubble">
                  <span id="ask-message"></span>
                  <div class="ask-input-row">
                    <input type="text" id="ask-input" />
                    <button id="ask-submit">✓</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="stage-controls">
            <span id="mouse-coords">x: 0, y: 0</span>
            <button class="btn-icon" id="btn-fullscreen" title="Fullscreen">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
            </button>
          </div>
        </div>

        <!-- Sprite Panel -->
        <div id="sprite-panel">
          <div id="sprite-panel-top">
            <div id="sprite-props" class="hidden">
              <!-- Name row — always shown -->
              <div class="prop-row">
                <label>Name</label>
                <input type="text" id="prop-name" class="prop-input prop-name" />
              </div>
              <!-- Position / size / dir rows — hidden for Stage -->
              <div class="prop-row" id="prop-row-xy">
                <label>X</label>
                <input type="number" id="prop-x" class="prop-input prop-num" />
                <label>Y</label>
                <input type="number" id="prop-y" class="prop-input prop-num" />
              </div>
              <div class="prop-row" id="prop-row-size">
                <label>Size</label>
                <input type="number" id="prop-size" class="prop-input prop-num" value="100" />
                <label>Dir</label>
                <div id="dir-wheel-container">
                  <canvas id="dir-wheel" width="36" height="36"></canvas>
                  <input type="number" id="prop-dir" class="prop-input prop-num" value="90" />
                </div>
              </div>
              <div class="prop-row" id="prop-row-rot">
                <label>Rotation</label>
                <select id="prop-rotation" class="prop-input">
                  <option value="all">All Around</option>
                  <option value="leftright">Left / Right</option>
                  <option value="none">None</option>
                </select>
              </div>
            </div>
          </div>
          <div id="sprite-list-area">
            <div id="sprite-list"></div>
            <div class="sprite-list-controls">
              <button class="btn btn-sm btn-accent" id="btn-add-sprite">+ Sprite</button>
              <button class="btn btn-sm btn-danger" id="btn-delete-sprite">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-header">
        <span id="modal-title"></span>
        <button id="modal-close">×</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Context Menu -->
  <div id="context-menu" class="hidden">
    <div class="context-item" id="ctx-rename">Rename</div>
    <div class="context-item ctx-danger" id="ctx-delete">Delete</div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-load-input" accept=".ps2" style="display:none" />

  <!-- Skulpt -->
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>

  <!-- App -->
  <script src="js/utils.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/python-api.js"></script>
  <script src="js/scheduler.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/costumes.js"></script>
  <script src="js/project.js"></script>
  <script src="js/publish.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
